# Declarative label set. Synced to the repo by .github/workflows/labels-sync.yml.
# Conventional-commit types, priorities, areas, and agent-workflow states.

# ── Type ──────────────────────────────────────────────────────────────────
- name: "type: feat"
  color: "1d76db"
  description: "New feature or capability"
- name: "type: fix"
  color: "d73a4a"
  description: "Bug fix"
- name: "type: perf"
  color: "fbca04"
  description: "Performance improvement"
- name: "type: refactor"
  color: "c5def5"
  description: "Code change that neither fixes a bug nor adds a feature"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type: test"
  color: "bfd4f2"
  description: "Adding or fixing tests"
- name: "type: build"
  color: "5319e7"
  description: "Build system, tooling, or CI/CD"
- name: "type: chore"
  color: "ededed"
  description: "Maintenance, no production code change"

# ── Priority ──────────────────────────────────────────────────────────────
- name: "priority: critical"
  color: "b60205"
  description: "Drop everything"
- name: "priority: high"
  color: "d93f0b"
  description: "Important, schedule soon"
- name: "priority: medium"
  color: "fbca04"
  description: "Normal priority"
- name: "priority: low"
  color: "0e8a16"
  description: "Nice to have"

# ── Area ──────────────────────────────────────────────────────────────────
- name: "area: ci-cd"
  color: "5319e7"
  description: "Pipelines & automation"
- name: "area: tooling"
  color: "c2e0c6"
  description: "Local dev tooling / scripts"
- name: "area: app"
  color: "1d76db"
  description: "Flutter client"
- name: "area: backend"
  color: "0052cc"
  description: "Backend / services"
- name: "area: testing"
  color: "bfd4f2"
  description: "Test infrastructure"
- name: "area: security"
  color: "b60205"
  description: "Security / privacy / compliance"

# ── Agent workflow ────────────────────────────────────────────────────────
- name: "agent: ready"
  color: "0e8a16"
  description: "Well-specified; safe for an AI agent to pick up"
- name: "agent: in-progress"
  color: "fbca04"
  description: "An agent is actively working this"
- name: "agent: needs-human"
  color: "d93f0b"
  description: "Blocked on a founder decision or credential"
- name: "agent: blocked"
  color: "b60205"
  description: "Blocked by a dependency"

# ── Meta ──────────────────────────────────────────────────────────────────
- name: "good first task"
  color: "7057ff"
  description: "Small, self-contained, low-risk"
- name: "do-not-merge"
  color: "000000"
  description: "Hold — must not be merged yet"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency bump (Dependabot)"
- name: "release"
  color: "0e8a16"
  description: "Release automation (Release Please)"
- name: "autorelease: pending"
  color: "ededed"
  description: "Release Please: pending"
- name: "autorelease: tagged"
  color: "0e8a16"
  description: "Release Please: tagged"
