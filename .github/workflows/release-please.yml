name: Release Please

# On every push to main, maintain a "release PR". Merging that PR bumps the
# version (pubspec.yaml), updates CHANGELOG.md, creates the GitHub Release and
# the vX.Y.Z tag. The tag then triggers release.yml to attach build artifacts.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
