name: Security

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=./pubspec.lock
            --format=sarif
            --output=osv-results.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
        continue-on-error: true

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Generate SBOM (SPDX via Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: kindredpaws-sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: kindredpaws-sbom.spdx.json
          if-no-files-found: warn

  workflow-hardening:
    name: workflow-hardening
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
      - name: yamllint (mirrors `just lint-actions`)
        run: pipx run yamllint .github/workflows
