name: Nightly

# Heavier suite that we do not want on every PR: full regression, audits,
# cross-platform build artifacts, golden/screenshot diffing.
on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.9"
  FLUTTER_CHANNEL: "stable"

jobs:
  full-regression:
    name: Full regression (all tags incl. golden/perf)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Full test suite + coverage (all layers run by default)
        run: flutter test --coverage --reporter expanded
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: nightly-coverage
          path: coverage/lcov.info
          if-no-files-found: warn

  screenshot-diff:
    name: Golden screenshot comparison
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Verify goldens (fails on visual regression)
        run: flutter test --tags golden
      - name: Upload failure diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: golden-failures
          path: "**/failures/*.png"
          if-no-files-found: ignore

  dependency-audit:
    name: Dependency & outdated audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Report outdated packages (informational)
        run: flutter pub outdated || true
      - name: Dependency tree (informational)
        # The authoritative vulnerability scan is OSV-Scanner in security.yml.
        run: flutter pub deps --style=compact

  build-matrix:
    name: Nightly build artifacts
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        if: matrix.platform == 'android'
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Build Android (release, unsigned)
        if: matrix.platform == 'android'
        run: flutter build apk --release
      - name: Build iOS (no codesign)
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nightly-${{ matrix.platform }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/ios/iphoneos/*.app
          if-no-files-found: ignore
