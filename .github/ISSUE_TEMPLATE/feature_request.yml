name: "✨ Feature / task"
description: "A new capability or a unit of build work."
labels: ["type: feat", "agent: ready"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should exist that doesn't yet? Tie it to a roadmap item if applicable.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete, testable conditions. An agent uses these as the definition of done.
      placeholder: |
        - [ ] ...
        - [ ] Tests added (unit/widget/golden/integration as appropriate)
        - [ ] `just verify` green
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap phase
      description: Which phase does this belong to? (See game-os/GAME_MASTER_EXECUTION_ROADMAP.md)
      options: ["Pre-Phase-0 (infra)", "Phase 0", "Phase 1", "Phase 2", "Phase 3+", "Unscheduled"]
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Guardrails
      options:
        - label: Within current phase scope (no scope creep into future phases).
        - label: Suitable for autonomous agent implementation.
